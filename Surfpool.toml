# Surfpool configuration for Sentinel Solana.
#
# Surfnet runs at http://127.0.0.1:8899 (default). The `[network]` section
# below configures clock + slot defaults. The `[[setup]]` block seeds the
# canonical mock PUSD mint at the address committed in keys/mock-pusd.pubkey
# so integration tests find the same mint pubkey they'd see on devnet.
#
# Phase 24 note: the stable side is Token-2022 (PUSD on mainnet is Token-2022
# with MetadataPointer + TokenMetadata extensions; this mock mirror keeps the
# base layout only — no extensions). The `[[setup]]` owner field must be the
# Token-2022 program id (TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb), NOT
# the classic SPL Token program (TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA).

[network]
# Default Surfnet behaviour. Override by passing flags to `surfpool start`.
block_production_mode = "clock"
log_level             = "info"
startup_wait_ms       = 5000

# ─── Mock PUSD mint seed ─────────────────────────────────────────────────
# The mint address below must match keys/mock-pusd.pubkey. The mint authority
# matches keys/mock-pusd-authority.pubkey. Decimals = 6.
#
# Surfpool's `surfnet_setAccount` cheatcode rebuilds the account at the
# given address with the supplied data + owner = TOKEN_2022_PROGRAM_ID.
[[setup]]
kind     = "set_account"
address  = "F5KjXXvUB9UP24Kky5yUiDGdHdA11Fbp5YHUkV8DRFvE"
owner    = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
lamports = 1461600
# 82 bytes of base64-encoded `spl_token::state::Mint` data (the base mint
# layout is identical for classic SPL and Token-2022; only the program-owner
# differs) with:
#   mint_authority    = 5JbXjGvf2UDtBqbAdQwXr8zDUToDjbnDgaXNFLY1wstD
#   supply            = 0
#   decimals          = 6
#   is_initialized    = true
#   freeze_authority  = None
# Generate the blob via `scripts/surfpool-seed.ts` or seed manually post-
# startup via `scripts/fund-pusd.ts` (which also creates the mint on first
# run when --usdc is omitted from `pnpm deploy`).
# data_base64 = "..."

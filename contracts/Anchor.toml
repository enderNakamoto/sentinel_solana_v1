[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test = "pnpm --filter @sentinel/contracts test"

# Anchor v1 defaults to surfpool for `anchor test` / `anchor localnet`.
# Surfpool config lives in /Surfpool.toml at repo root.
[surfpool]
log_level             = "info"
block_production_mode = "clock"
startup_wait          = 5000

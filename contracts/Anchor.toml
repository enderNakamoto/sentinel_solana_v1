[toolchain]
anchor_version = "1.0.0"

[features]
resolution = true
skip-lint = false

# ─────────────────────────────────────────────────────────────────
# Program IDs — PLACEHOLDERS (must be replaced before first `anchor build`)
#
# Phase 0 subtask 10/39 (`scripts/keys-bootstrap.sh`) generates real
# keypairs into `target/deploy/<name>-keypair.json`, prints addresses via
# `anchor keys list`, and the developer pastes them into BOTH:
#   1. The blocks below (`programs.localnet` and `programs.devnet`)
#   2. `declare_id!("...")` at the top of each program's `src/lib.rs`
#
# The placeholders below are well-known mainnet addresses (Anchor template,
# wSOL, USDC, USDT, Token Program) used purely as parseable stand-ins.
# `anchor build` will fail until these are replaced with the generated keys.
# ─────────────────────────────────────────────────────────────────


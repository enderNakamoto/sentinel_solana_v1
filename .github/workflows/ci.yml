name: CI

# Phase 7: first CI workflow lands here. Phase 0 deferred CI because the
# pre-program-logic phase had nothing to gate; with all 5 programs feature-
# complete + Phase 6's LiteSVM integration suite, every PR can now run the
# full unit+integration test suite + a typecheck pass + the IDL pipeline.
#
# Does NOT deploy. Deploys to devnet/testnet/mainnet are human-triggered
# via `pnpm run deploy --cluster <cluster> --owner <pubkey>` from a
# trusted local machine with a funded keypair.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NO_DNA: "1"

jobs:
  test:
    name: Build + LiteSVM tests + typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0
          run_install: false

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-cli-${{ runner.os }}-3.1.14

      - name: Install Solana CLI
        run: |
          if ! command -v solana >/dev/null 2>&1; then
            sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install Anchor CLI
        env:
          CARGO_PROFILE_RELEASE_LTO: "off"
        run: |
          if ! command -v anchor >/dev/null 2>&1; then
            cargo install --git https://github.com/solana-foundation/anchor --tag v1.0.0 anchor-cli --locked
          fi
          anchor --version

      - name: anchor build (5 programs)
        run: |
          cd contracts
          NO_DNA=1 anchor build

      - name: sync IDLs to frontend + executor
        run: NO_DNA=1 pnpm sync-idl

      - name: gen-clients (Codama)
        run: NO_DNA=1 pnpm gen-clients

      - name: typecheck (all workspaces)
        run: NO_DNA=1 pnpm typecheck

      - name: LiteSVM unit tests (5 programs)
        run: NO_DNA=1 pnpm test:contracts

      - name: LiteSVM integration tests (Phase 6 cross-program)
        run: NO_DNA=1 pnpm --filter @sentinel/contracts run test --config vitest.config.ts tests/integration.test.ts
        # Phase 7's `tests/integration/full-flow-deployed.test.ts` is intentionally
        # NOT run in CI — it requires a deployed Surfpool, which is operator-driven.

      - name: Verify deployment artifact schema (only if surfpool-latest.json exists)
        if: hashFiles('deployments/surfpool-latest.json') != ''
        run: |
          node -e "
            const a = JSON.parse(require('fs').readFileSync('deployments/surfpool-latest.json'));
            for (const k of ['cluster','rpcUrl','deployer','owner','authorities','usdcMint','programs','pdas']) {
              if (!(k in a)) throw new Error('missing key in artifact: ' + k);
            }
            for (const p of ['governance','vault','oracle_aggregator','flight_pool','controller']) {
              if (!a.programs[p]) throw new Error('missing program: ' + p);
            }
            console.log('artifact schema OK');
          "
